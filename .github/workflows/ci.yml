name: CI

on:
  push:
    branches:
      - main
      - "module/**"
      - "build/**"
      - "integration/**"
  pull_request:

permissions:
  contents: read

jobs:
  m00-windows:
    name: M00 governance (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.30"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "11.9.0"
          run_install: false

      - name: Validate locks and install dependencies
        shell: pwsh
        run: |
          uv lock --check
          pnpm install --frozen-lockfile

      - name: Run M00 gate
        shell: pwsh
        run: |
          function Invoke-Checked {
            param([scriptblock]$Command, [string]$Description)
            & $Command
            if ($LASTEXITCODE -ne 0) {
              throw "$Description failed with exit code $LASTEXITCODE"
            }
          }
          Invoke-Checked { uv run --frozen python tools/dev/validate_m00.py } "M00 validator"
          Invoke-Checked { uv run --frozen python -m unittest discover -s tests -p "test_*.py" } "Python tests"
          Invoke-Checked { node tools/dev/check-node-workspace.mjs } "Node workspace check"
          Invoke-Checked { pnpm test:contracts } "M01 contract gate"
          Invoke-Checked { uv run --frozen python tools/license/check_provenance.py } "provenance check"
          Invoke-Checked { pnpm test:contracts:repeat } "M01 contract 20-run repeat gate"
          Invoke-Checked { uv run --frozen python -m compileall -q tools tests } "Python compile check"
          Invoke-Checked { git diff --check } "Git whitespace check"

      - name: Require a clean tracked tree
        shell: pwsh
        run: |
          $changes = git status --porcelain --untracked-files=all
          if ($changes) {
            $changes
            throw "M00 validation modified the source tree"
          }

      - name: Generate M00 evidence
        shell: pwsh
        run: |
          function Invoke-Checked {
            param([scriptblock]$Command, [string]$Description)
            & $Command
            if ($LASTEXITCODE -ne 0) {
              throw "$Description failed with exit code $LASTEXITCODE"
            }
          }
          Invoke-Checked { uv run --frozen python tools/dev/hardware_inventory.py --output artifacts/verification/M00/hardware-inventory.json } "hardware inventory"
          Invoke-Checked { uv run --frozen python tools/sbom/generate_sbom.py } "SBOM generation"
          Invoke-Checked { uv run --frozen python tools/dev/generate_artifact_manifest.py } "artifact manifest generation"

      - name: Upload M00 evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: m00-evidence
          path: artifacts/verification/M00/
          if-no-files-found: error
