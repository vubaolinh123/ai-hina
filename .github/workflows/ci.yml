name: CI

on:
  push:
    branches:
      - main
      - "module/**"
      - "integration/**"
  pull_request:

permissions:
  contents: read

jobs:
  m00-windows:
    name: M00 governance (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.30"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "11.9.0"
          run_install: false

      - name: Validate locks
        shell: pwsh
        run: |
          uv lock --check
          pnpm install --lockfile-only --frozen-lockfile

      - name: Run M00 gate
        shell: pwsh
        run: |
          uv run --frozen python tools/dev/validate_m00.py
          uv run --frozen python -m unittest discover -s tests -p "test_*.py"
          node tools/dev/check-node-workspace.mjs
          uv run --frozen python tools/license/check_provenance.py
          uv run --frozen python -m compileall -q tools tests
          git diff --check

      - name: Require a clean tracked tree
        shell: pwsh
        run: |
          $changes = git status --porcelain --untracked-files=all
          if ($changes) {
            $changes
            throw "M00 validation modified the source tree"
          }

      - name: Generate M00 evidence
        shell: pwsh
        run: |
          uv run --frozen python tools/dev/hardware_inventory.py --output artifacts/verification/M00/hardware-inventory.json
          uv run --frozen python tools/sbom/generate_sbom.py
          uv run --frozen python tools/dev/generate_artifact_manifest.py

      - name: Upload M00 evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: m00-evidence
          path: artifacts/verification/M00/
          if-no-files-found: error
