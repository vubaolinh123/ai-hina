model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
approval_policy = "never"

[agents.architecture_contracts]
description = "Opt-in review for high-blast-radius boundaries, contracts, and migrations."
config_file = "agents/architecture-contracts.toml"

[agents.oss_researcher]
description = "Opt-in verification for named upstream dependencies and provenance."
config_file = "agents/oss-researcher.toml"

[agents.module_builder]
description = "Implements one bounded delegated slice inside an exclusive write lease."
config_file = "agents/module-builder.toml"

[agents.qa_designer]
description = "Opt-in design for ambiguous, adversarial, or safety-critical acceptance."
config_file = "agents/qa-designer.toml"

[agents.qa_runner]
description = "Runs supplied repeat, benchmark, replay, or fault commands on a frozen commit."
config_file = "agents/qa-runner.toml"

[agents.safety_reviewer]
description = "Reviews frozen diffs that affect trust, actions, privacy, provenance, or public output."
config_file = "agents/safety-reviewer.toml"

[agents.integration_release]
description = "Opt-in assembly for large release evidence sets without product changes."
config_file = "agents/integration-release.toml"
