[project]
name = "hina-memory"
version = "0.1.0"
description = "Consent-gated authoritative and derived long-term memory for Hina AI"
requires-python = ">=3.12,<3.15"
license = "MIT"
dependencies = [
  "qdrant-client==1.18.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hina_memory"]
